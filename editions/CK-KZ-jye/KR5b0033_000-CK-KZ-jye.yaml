body:
  text: 法燭法者規矩之謂總稱曰法規圓矩方萬物從之得正燭者有光之物佐月嗣日開昏朗闇用其明得有所見也邪曲無法則無以自正用法無明則莫見得失欲正不可無法用法不可無明自定不可不齋齋不可不見此經此經故爲法之燭秉之遊道藏故尅獲於眞實也道言萬物人爲貴人以生爲寶生之所頼唯神與氣神氣之在人身爲四體之命人不可須臾無氣不可俯仰失神失神則五臟潰壞失氣則顚蹷而亡氣之與神常相隨而行神之與氣常相宗爲强神去則氣亡氣絶則身喪一切皆知畏死而樂生不知生活之功在於神氣而數凶其心而犯其氣屢淫其神而彫其命不愛其靜存守其眞故致於枉殘也人何可不惜精守氣以要久延之視和愛育物爲枝葉之福聖人以百姓奔競五慾不能自定故立齋法因事息事禁戒以關內㓂威儀以防外賊禮誦役身口乘動以反靜也思神役心念御有以歸虛也能靜能虛則與道合譬迴逸驥之足以整歸眞之駕嚴遵云虛心以原道德靜氣以期神明此之謂也而末世學者貴華賤實福在於靜而動以求之命在於我而捨已就物若斯之徒雖欣修齋不解齋法或解齋法不識齋體或識齋體不達齋義或達齋義不得齋意紛紜錯亂靡所不爲流宕失宗永不自覺譬背驚風而順迅流不知泝洄反源遂長淪於苦海可不悲哉可不痛哉於是說經十章以施齋時名曰法燭宿啟說一章六時行道說六章三時思神說三章若法師必炳之以行齋臨壇法眾皆虛心盟受者則視聽明朗庶覩大道之門矣卽道言道者至理之自德者順理而行經者猶通之徑也道猶道路也德謂善德也經猶徑度也行猶行步也法猶法式也夫人學道要當依法尋經行善成德以至於道若不作功德但守一不移終不成道譬如人坐於家中而不行步豈得道里耶夫道三合而成德德不滿三諸事不成三者謂道德人也人一也行功德二也德足成道三也三事合乃得道也若人但作功德而不曉道亦不得道若但曉道而無功德亦不得道若有道法而無人則至理翳沒歸於無有譬如種穀投種土中而無水潤何能生乎有君有臣而無民何宰牧乎有天有地而無人物何成養乎故曰三生萬物道言欲治人者當先治身欲正人者當先自正治身正心莫先於齋直齋者齊也齊人參差之行直者正也正人入道之心念淨神靜齋之義也所以齋者凡人之生有四大之累饑則憂食寒則憂衣衣食旣足憂當積蓄貧者願富賤者願貴於是榮味聲色眾慾互生未得憂不得旣得又憂失志無須臾之定乃終身憂勤矣動作求競事務猥積是非得失哀樂喜怒思慮煩𡨚形勞神苦致道氣遠已魂魄離人身如空城凶邪曰臻嬰痾遇疾夭命䘮身罹謫三塗殃流後世是以聖人立齋淸淨屏遣塵勞具錄魂魄休息精神當至誠恭肅絕語止諠不得戯笑有所呵譴及雜想亂念目不視色不見是非耳不聽音不聞凶祥以淡泊爲心虛無爲意中和爲主少食爲本念道存神則天人相感災除福降性命得矣故曰淸浄爲天下正道言齋但修正天地寂然絕思無所一念卽合道氣流行入人道中所受將軍吏兵則衞護聽人驅使萬向如願若不能淸淨而躁擾多慮違和犯順忤逆冥科身爲善行心惡不攺則吏兵委離不爲人使所求不合凶害叢至故曰取天下常以無事道言齋者可謂整百行建萬善者也要當能忍辱能柔弱能慈愛能仁施能陰德能忠孝能至誠能謹信能戒愼能肅敬備此十能然後乃可修齋靜思反聽內視還念形中口不妄言身不妄動故無色之色爲之見無聲之聲爲之聞無味之味爲之甘不言之言爲之應神明爲之降福氣爲之臻則得心化意聖好夢善景能覩未然之徵無願不獲以此爲効若外不奉威儀內不守戒律行無可記功無可著精誠不至懷疑猶豫內外不相應口心不相副情急性戾多態兩舌陰詛嫉妬志思不正於身精神消於淫慾貪財好色不能自制身心如此雖修齋直終身無福夫何故然以意思不存於內魂魄勞役於外和氣去故不能有所感動也故曰無欲以靜天下自正道言爲道修齋當奉行戒法廣度無極法禁微妙檢攝意態伏心就淨殃垢消滅行智慧之便拔生死之難絶一切之想就無爲之地深觀所起細察所滅觀其所病療以惠藥若見色利以誡掩目若聞怨惡之言以誡塞耳若食甘香之美以誡度口若願想財寶放情愛慾以誡挫心若欲姦非趣向惡事以誡折足旣總其要身不犯誡超出塵羅不入塵俗處眾愛之中心在道誡之藏處憂患之舍心在善救之堂住闇冥之室心在斷滅之戸倚不固之屋心在方便之門坐蛇虺之地心在捨遠之逕居虎豹之藪心在福德之舘乘浮船之險心固自濟之路近盛火之林心惟灌滅之要立荆棘之園心在鎧捍之障是我持誡行智慧之便也故曰挫其銳解其紛道言立人之道有三因五主何謂三因一曰神二曰氣三曰形也神因氣而立氣因神而行形因神而存神因形而藏神逝則氣散氣散則神亡故聖人先於養神次於養氣次於養形三者和而相得乃能長生何謂五主一曰精主見五色二曰神主聞五音三曰魂主别善惡四曰魄主察淸濁五曰氣主識痛癢故形體者是神魂之屋宅五臟者精魂之房室九竅者是神氣之門牖欲人生目視耳聽鼻息口言形知痛癢者皆是精神魂魄氣所爲也若其一不存則愚癡二不存則昏惑三不存則衰耗四不存則百疾生五不存則死亡夫亡者目不能有所見耳不能有所聞鼻不能復息口不能復言形不知痛癢此豈復無耳目鼻口形耶特是情神魂魄之亡耳故喜怒則精散而不藏愁憂則神閉塞而不行驚恐則魂魄飛揚飲食過差則形滯氣不通故聖人見失神者夭失精者狂失魂者悲哭失魄者脫色失志者亂失意者無氣是以虛心去慾挫銳解紛不以好美盈溢傷精不以思慮愛憎傷神不以喜樂恣態傷魂不以忿怒激切傷魄不以飲食過差傷形不以悲哀極言傷氣乃安居屏處合天地之氣存在於身順四時適寒暑節陰陽和喜怒裁飲食調憂苦避霧露逃風雨寶氣補精谷神養魂内視若肓反聽若聾虛無淡泊不在東西內存五臟分别色狀存心卽益精存肝卽益明存肺卽身光存脾卽體輕存腎卽氣長神氣內守病安所從故曰谷神不死道言人稟五臟資於五行外爲形體內爲性情骨屬木血屬水肉屬土牙齒屬金氣煖屬火肝仁肺義心禮腎智脾信木性强直火性猛烈土性仁和金性嚴毳水性謙退又稟氣之始各有淸濁剛柔稟氣淸者聰明聖達氣之柔者則優和慈仁質樸湻篤氣之剛者則高嚴壯烈氣之濁者則愚癡凶虐各隨其所屬所稟以定情性性者命也愚者恣之以夭其命知者深見迮伏其性正心正行恭念至道察見本心施爲百行務爲合道若有不合者則以天科法律抑割本情攺易其性迮伏其心奉行師法歸命師老不敢懈替如是則天神敬之地祗護之凶逆畏之師老祐之司命度之著左契南斗紀名生錄北斗削除死籍得爲眞人伏性載命此之謂也故曰復命曰常不知常妄作凶道言守道靜思先當正坐閉門耳目還神光明於絳宫絕去諸念不得强有所視思想髣髴久久喘息稍微從是以往自然不復自覺喘息不覺喘息便不復自知有身也至能忘身則是得定向道門者也當爾之時神在天上虛空之中左顧右視無所一見以此爲證故曰塞其兌閉其門用其光復歸其明道言人身中有三一者神魂魄也中央之一神也中和之精也其氣正左方之一魂也純陽之精其氣淸右方之一魄也純陰之精其氣濁中央之一卽我神也道之子也左右各一輔相我神其氣淸濁則其行有善惡左方之一日日聞告我爲善其功德曰盛我得成正道右方之一日曰教告我惡事牽我入惡中我惡日深淪沒邪城爲道者若欲明此三一覺悟善惡分别邪正唯當閑身靜意熟讀諸經還自思惟則智慧自生挫遣五慾蕩滌六情行修善積則功德成就則右方之一邪魔羣鬼悉皆懾伏不能干我也思念專正立致感通若不曉邪正又無善功强閉耳目思神行道此則眾邪便共千人造作邪念前念適滅後念復起更相因襲無有解也己如此亂惑萬劫不定故曰載營抱一滌除玄覽道言人有精神魂魄體與凡類殊異尊與天地同道貴與神明合德明與日月通察必能靜形定意精誠齋戒勤敬三寶深識天官吏兵之位復還光內觀形內之宫室存念神景之所處常以虛中求眞無中求有則九天之上可得照九地之下可得覩玄精可降元始可稟太上至尊而爲至誠顯生道至重而爲至誠感故求生者腹中而起一形之中則知天地之體也而包八十一域舍四海五嶽雲興雨施在於吹噓湊澤潤液在於呼吸形在神往忽若指掌坐修於胷心之裏然臻福八極之表神和霧集在於不移淸淨一時之間消災致夀長生在已也故曰不窺牖見天道不出戸知天下
